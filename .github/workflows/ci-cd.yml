name: CI/CD Pipeline

on:
  push:
    branches:
      - 'main'
      - 'angular-*'
      - '*upgrade'
    tags:
      - '2.*'
      - '3.*'
      - '4.*'
  pull_request:
    branches:
      - 'main'
      - 'angular-*'

permissions:
  contents: write
  packages: write

env:
  REPO_NAME: ${{ github.event.repository.name }}
      - '*upgrade'

jobs:
  lint:
    name: Run linters
    permissions:
      contents: write # Allow the workflow to write to the repository
      packages: write # Allow the workflow to publish packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com" # Best practice for automated commits
          git config --global user.name "github-actions[bot]"                       # Best practice for automated commits
          git checkout ${{ github.ref }}

      - name: Check for automated release commit
        run: |
          if git log -2 --pretty=%B | grep -q "chore(release):"; then
            echo "Skipping pipeline for automated release commit."
            exit 0
          fi

      - name: Setup .npmrc
        run: |
          if [ -z "${{ secrets.GN_GITHUB_TOKEN }}" ]; then
            echo "ERROR: GN_GITHUB_TOKEN is not set."
            exit 1
          fi
          echo "@dasdigitalplatform:registry=https://npm.pkg.github.com/" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          cat .npmrc

      - name: Install dependencies
        run: npm install

      - name: Determine if version bump is needed and run release
        id: version_logic
        run: |
          if git log -1 --pretty=%B | grep -Eiq "^(feat|fix|BREAKING CHANGE)"; then
          echo "Version bump needed. Running version-release."
          npm run version-release

          # Get the new version from the root package.json after standard-version has run
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "::set-output name=version_bumped::true"
          else
          echo "No version bump needed. Keeping the same version."
          echo "NEW_VERSION=" >> $GITHUB_ENV
          echo "::set-output name=version_bumped::false"
          fi

      - name: Commit and push version changes (if any)
        if: steps.version_logic.outputs.version_bumped == 'true'
        run: |
          if git diff --exit-code projects/design/dls-global-angular/package.json &>/dev/null; then
            echo "Subfolder package.json is already committed or no changes."
          else
            echo "Committing subfolder package.json changes."
            git add projects/design/dls-global-angular/package.json
            # || true to prevent failure if nothing to commit (unlikely here)
            git commit -m "[skip ci] Sync subfolder version to ${{ env.NEW_VERSION }}" || true
          fi

          echo "Pushing all committed changes and tags..."
          git push --follow-tags origin HEAD:${{ github.ref }}

      - name: Build the library
        run: npm run release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  build-storybook:
      attestations: write
      statuses: write
      id-token: write
      contents: read
      packages: read
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/lint.yml@spark-fix
    with:
      lint-yaml: true
      node-version: '22.14.0'
    secrets: inherit
  predict-version-number:
    name: Predict next version number
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_name == 'angular-v20-release' || github.ref_name == 'angular-v19-release')
    outputs:
      v-version: ${{ steps.version.outputs.v-version }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Get next version
        uses: jeppesen-foreflight/dp-actions-version-increment@v1.2
        id: version
        with:
          scheme: conventional_commits
          token: ${{ secrets.GITHUB_TOKEN }}
          release_branch: ${{ github.ref_name }}
  codeql-scan:
    name: Run CodeQL scan
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/codeql-node-scan.yml@spark-fix
    with:
      node-version: '22.14.0'
    secrets: inherit
  publish-package:
    name: Publish package
    needs: [predict-version-number]
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/build-and-publish-npm-package.yml@spark-fix
    with:
      node-version: '22.14.0'
      package-version: ${{ needs.predict-version-number.outputs.version }}
      project-path: dist/design/dp-dls-global-angular
    secrets: inherit
  create-release:
    name: Create release
    needs: [predict-version-number, publish-package]
    permissions:
      contents: write
      packages: read
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/create-release.yml@spark-fix
    with:
      release-version-number: ${{ needs.predict-version-number.outputs.v-version }}

  # Publishing Storybook branch wise.
  # CRITICAL FIX: Job is now a pure workflow call (no runs-on, no steps, no outputs).
  # The URL is printed inside the reusable workflow itself.
  publish-storybook:
    name: Deploy Storybook Pages
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      pages: write 
      attestations: write
      id-token: write

    # REMOVED: No outputs needed, as the URL is printed inside the called workflow.
    
    uses: ./.github/workflows/publish-storybook.yml
    with:
      node-version: 20
      branch-name-slug: ${{ github.ref_name }} 
      deploy-sub-directory: >
        ${{ 
          github.ref_name 
        }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}