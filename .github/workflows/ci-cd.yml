name: CI/CD Pipeline

on:
  push:
    branches:
      - 'main'
      - 'develop'
      - 'angular-*'
    tags:
      - '2.*'
      - '3.*'
      - '4.*'
      - '*'
  pull_request:
    branches:
      - 'main'
      - 'develop'
      - 'angular-*'

permissions:
  contents: write
  packages: write

env:
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  build-package:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'synchronize'
    outputs:
      version_bumped: ${{ steps.version_logic.outputs.version_bumped }}
    permissions:
      contents: write # Allow the workflow to write to the repository
      packages: write # Allow the workflow to publish packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GN_GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com" # Best practice for automated commits
          git config --global user.name "github-actions[bot]"                       # Best practice for automated commits

      - name: Check for automated release commit
        run: |
          if git log -1 --pretty=%B | grep -Eq "(chore\(release\):|^\[skip ci\]|\[skip ci\]$)"; then
            echo "Skipping pipeline for automated release commit."
            exit 0
          fi

      - name: Setup .npmrc
        run: |
          if [ -z "${{ secrets.GN_GITHUB_TOKEN }}" ]; then
            echo "ERROR: GN_GITHUB_TOKEN is not set."
            exit 1
          fi
          echo "@dasdigitalplatform:registry=https://npm.pkg.github.com/" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          cat .npmrc

      - name: Install dependencies
        run: npm install

      - name: Determine if version bump is needed and run release
        id: version_logic
        run: |
          if git log -1 --pretty=%B | grep -Eiq "^(feat|fix|BREAKING CHANGE)"; then
          echo "Version bump needed. Running version-release."
          npm run version-release

          # Get the new version from the root package.json after standard-version has run
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version_bumped=true" >> $GITHUB_OUTPUT
          else
          echo "No version bump needed. Keeping the same version."
          echo "NEW_VERSION=" >> $GITHUB_ENV
          echo "version_bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push version changes (if any)
        if: steps.version_logic.outputs.version_bumped == 'true'
        run: |
          if git diff --exit-code projects/design/dls-global-angular/package.json &>/dev/null; then
            echo "Subfolder package.json is already committed or no changes."
          else
            echo "Committing subfolder package.json changes."
            git add projects/design/dls-global-angular/package.json
            # || true to prevent failure if nothing to commit (unlikely here)
            git commit -m "[skip ci] Sync subfolder version to ${{ env.NEW_VERSION }}" || true
          fi

          echo "Pushing all committed changes and tags..."
          git push --follow-tags origin HEAD

      - name: Build the library
        run: npm run release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  build-storybook:
    runs-on: ubuntu-latest
    needs: build-package
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.email "dasdesignsystem@boeing.com"
          git config --global user.name "dasdesignsystem"

      - name: Check for automated release commit
        run: |
          if git log -1 --pretty=%B | grep -Eq "(chore\(release\):|^\[skip ci\]|\[skip ci\]$)"; then
            echo "Skipping pipeline for automated release commit."
            exit 0
          fi

      - name: Setup .npmrc
        run: |
          echo "@dasdigitalplatform:registry=https://${{ vars.NPM_REGISTRY_URL }}/" >> .npmrc
          echo "//${{ vars.NPM_REGISTRY_URL }}/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          cat .npmrc

      - name: Clear npm cache and install dependencies
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json
          npm install --loglevel verbose

      - name: Build Storybook
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # For main branch, build to public directory (root of GitHub Pages)
            npm run build-storybook -- --output-dir public
          else
            # Extract branch name from refs/heads/branch-name
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            # Create directory with branch name
            mkdir -p public/$BRANCH_NAME
            npm run build-storybook -- --output-dir public/$BRANCH_NAME
          fi

      - name: Upload Storybook artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storybook
          path: |
            public
            storybook

  publish-npm:
    runs-on: ubuntu-latest
    needs: build-package
    if: needs.build-package.outputs.version_bumped == 'true'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Publish NPM package with dist-tag
        run: |
          cd dist/design/dls-global-angular
          echo "@dasdigitalplatform:registry=https://${{ vars.NPM_REGISTRY_URL }}/" >> .npmrc
          echo "//${{ vars.NPM_REGISTRY_URL }}/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          NPM_PACKAGE_NAME=$(node -p "require('./package.json').name")
          NPM_PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "NPM_PACKAGE_NAME=$NPM_PACKAGE_NAME" >> $GITHUB_ENV
          echo "NPM_PACKAGE_VERSION=$NPM_PACKAGE_VERSION" >> $GITHUB_ENV
          TAG_NAME="${NPM_PACKAGE_VERSION}"

          # Determine dist-tag based on tag pattern
          if [[ "$TAG_NAME" == 2.* ]]; then
            DIST_TAG="angular-18"
          elif [[ "$TAG_NAME" == 3.* ]]; then
            DIST_TAG="latest"
          elif [[ "$TAG_NAME" == 4.* ]]; then
            DIST_TAG="angular-20"
          else
            DIST_TAG="next"
          fi

          echo "Publishing ${NPM_PACKAGE_NAME}@${NPM_PACKAGE_VERSION} with dist-tag '$DIST_TAG'..."
          npm publish --tag $DIST_TAG


  deploy-storybook:
    runs-on: ubuntu-latest
    needs: build-storybook
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Storybook artifacts
        uses: actions/download-artifact@v4
        with:
          name: storybook
          path: public

      - name: Deploy Storybook to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@6c2d9db40f9296374acc17b90404b6e8864128c8
        with:
          folder: public
          branch: gh-pages
          clean: true # Automatically clean up old files

  pr-develop:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .npmrc
        run: |
          echo "@dasdigitalplatform:registry=https://${{ vars.NPM_REGISTRY_URL }}/" >> .npmrc
          echo "//${{ vars.NPM_REGISTRY_URL }}/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          cat .npmrc

      - name: Install dependencies
        run: npm install

      - name: Run build and test scripts
        run: |
          npm run lib:build
          npm run demo:build
          npm run build-storybook

      - name: Upload coverage and lint results
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
