name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dp-dls-global-angular
        uses: actions/checkout@v4
        with:
          path: dp-dls-global-angular

      - name: Checkout dp-dls-global-assets
        uses: actions/checkout@v4
        with:
          repository: Kellieisme/dp-dls-global-assets
          path: dp-dls-global-assets

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build dp-dls-global-assets
        working-directory: dp-dls-global-assets
        run: |
          npm install
          npm run build

      - name: Install dependencies
        working-directory: dp-dls-global-angular
        run: npm install

      - name: Build library
        working-directory: dp-dls-global-angular
        run: npx ng build "@jeppesen-foreflight/dp-dls-global-angular"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dp-dls-global-angular/dist/
