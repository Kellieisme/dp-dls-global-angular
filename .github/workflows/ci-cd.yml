name: CI/CD Pipeline

on:
  push:
    branches:
      - 'main'
      - 'develop'
      - 'angular-*'
    tags:
      - '2.*'
      - '3.*'
      - '4.*'
  pull_request:
    branches:
      - 'main'
      - 'angular-*'
      - '*upgrade'

jobs:
  lint:
    name: Run linters
    permissions:
      attestations: write
      statuses: write
      id-token: write
      contents: read
      packages: read
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/lint.yml@spark-fix
    with:
      lint-yaml: true
      node-version: 20
    secrets: inherit
  predict-version-number:
    name: Predict next version number
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      v-version: ${{ steps.version.outputs.v-version }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Get next version
        uses: jeppesen-foreflight/dp-actions-version-increment@v1.2
        id: version
        with:
          scheme: ${{ inputs.version-scheme }}
          token: ${{ secrets.GITHUB_TOKEN }}
          increment: ${{ inputs.increment }}
          release_branch: angular-19
  # predict-version-number:
  #   name: Predict version number
  #   permissions:
  #     contents: read
  #     packages: read
  #   uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/predict-version-number.yml@spark-fix
  #   with:
  #     version-scheme: semver
  #     increment: patch
  #     release_branch: angular-19
  # run-tests:
  #   name: Run tests
  #   permissions:
  #     contents: read
  #     attestations: write
  #     id-token: write
  #     packages: read
  #   uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/npm-tests.yml@spark-fix
  #   with:
  #     node-version: 20
  #   secrets: inherit
  codeql-scan:
    name: Run CodeQL scan
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/codeql-node-scan.yml@spark-fix
    with:
      node-version: 20
    secrets: inherit
  publish-package:
    name: Publish package
    needs: [predict-version-number]
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/build-and-publish-npm-package.yml@spark-fix
    with:
      node-version: 20
      package-version: ${{ needs.predict-version-number.outputs.version }}
      project-path: dist/design/dp-dls-global-angular
    secrets: inherit
  create-release:
    name: Create release
    needs: [predict-version-number, publish-package]
    permissions:
      contents: write
      packages: read
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/create-release.yml@spark-fix
    with:
      release-version-number: ${{ needs.predict-version-number.outputs.v-version }}
