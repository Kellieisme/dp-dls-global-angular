name: CI/CD Pipeline

on:
  push:
    branches:
      - 'main'
      - 'angular-*'
      - '*upgrade'
    tags:
      - '2.*'
      - '3.*'
      - '4.*'
  pull_request:
    branches:
      - 'main'
      - 'angular-*'
      - '*upgrade'

jobs:
  lint:
    name: Run linters
    permissions:
      attestations: write
      statuses: write
      id-token: write
      contents: read
      packages: read
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/lint.yml@spark-fix
    with:
      lint-yaml: true
      node-version: '22.14.0'
    secrets: inherit
  predict-version-number:
    name: Predict next version number
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_name == 'angular-v20-release' || github.ref_name == 'angular-v19-release')
    outputs:
      v-version: ${{ steps.version.outputs.v-version }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Get next version
        uses: jeppesen-foreflight/dp-actions-version-increment@v1.2
        id: version
        with:
          scheme: conventional_commits
          token: ${{ secrets.GITHUB_TOKEN }}
          release_branch: ${{ github.ref_name }}
  codeql-scan:
    name: Run CodeQL scan
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/codeql-node-scan.yml@spark-fix
    with:
      node-version: '22.14.0'
    secrets: inherit
  publish-package:
    name: Publish package
    needs: [predict-version-number]
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/build-and-publish-npm-package.yml@spark-fix
    with:
      node-version: '22.14.0'
      package-version: ${{ needs.predict-version-number.outputs.version }}
      project-path: dist/design/dp-dls-global-angular
    secrets: inherit
  create-release:
    name: Create release
    needs: [predict-version-number, publish-package]
    permissions:
      contents: write
      packages: read
    uses: jeppesen-foreflight/dp-jcps-shared-workflows/.github/workflows/create-release.yml@spark-fix
    with:
      release-version-number: ${{ needs.predict-version-number.outputs.v-version }}

  # Publishing Storybook branch wise.
  # CRITICAL FIX: Job is now a pure workflow call (no runs-on, no steps, no outputs).
  # The URL is printed inside the reusable workflow itself.
  publish-storybook:
    name: Deploy Storybook Pages
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      pages: write 
      attestations: write
      id-token: write

    # REMOVED: No outputs needed, as the URL is printed inside the called workflow.
    
    uses: ./.github/workflows/publish-storybook.yml
    with:
      node-version: 20
      branch-name-slug: ${{ github.ref_name }} 
      deploy-sub-directory: >
        ${{ 
          github.ref_name 
        }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}