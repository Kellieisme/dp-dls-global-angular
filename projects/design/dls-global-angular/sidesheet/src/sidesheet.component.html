<mat-sidenav-container>
  <mat-sidenav
    #sidenav
    [mode]="sidesheetMode"
    [opened]="opened"
    [style.width]="sidesheetWidth"
    [position]="sidesheetPosition"
  >
    <mat-toolbar>
      <span>Sheet title</span>
      <button mat-icon-button (click)="sidenav.close()">
        <mat-icon svgIcon="icon-close"></mat-icon>
      </button>
    </mat-toolbar>
    <div class="sidesheet-content">
      <!-- Your content here -->
    </div>

    <mat-divider></mat-divider>
    <div class="sidesheet-footer">
      <div class="footer-actions" *ngIf="showFooter">
        <ng-container *ngFor="let button of buttons">
          <button
            mat-button
            *ngIf="button.buttonType === 'text'"
            (click)="button.onClick()"
          >
            {{ button.text }}
          </button>
          <button
            mat-stroked-button
            *ngIf="button.buttonType === 'stroked'"
            (click)="button.onClick()"
          >
            {{ button.text }}
          </button>
          <button
            mat-flat-button
            *ngIf="button.buttonType === 'flat'"
            (click)="button.onClick()"
          >
            {{ button.text }}
          </button>
        </ng-container>
      </div>
    </div>
  </mat-sidenav>
  <mat-sidenav-content>
    <!-- Your main content here -->
    <button mat-button (click)="sidenav.open()">Open Side Sheet</button>
  </mat-sidenav-content>
</mat-sidenav-container>
