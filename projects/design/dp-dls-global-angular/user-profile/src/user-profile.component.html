<ng-container>
  <div class="user-profile" [ngClass]="getProfileClass()">
    @switch (hasValidImageSource()) {
      @case (true) {
        <img [src]="userAvatarSource" alt="User profile image" class="user-profile__image" />
      }
      @case (false) {
        <div class="user-profile__monogram">{{ getMonogram() }}</div>
      }
    }
  </div>
</ng-container>
