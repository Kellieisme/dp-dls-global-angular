# Publish Angular component library NPM package
publish-npm:
  stage: deploy
  only:
    - angular-19
    - develop
  script:
    - |
      if git log -1 --pretty=%B | grep -q "chore(release):"; then
        echo "Skipping pipeline for automated release commit."
        exit 0  # Exit with success to skip the pipeline
      fi
    - cd dist/design/dls-global-angular
    - echo "@${CI_PROJECT_ROOT_NAMESPACE}:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    # Extract a few values from package.json
    - NPM_PACKAGE_NAME=$(node -p "require('./package.json').name")
    - NPM_PACKAGE_VERSION=$(node -p "require('./package.json').version")
    - echo "Created the following .npmrc:"; cat .npmrc

    # Validate that the package name is properly scoped to the project's root namespace.
    - |
      if [[ ! $NPM_PACKAGE_NAME =~ ^@$CI_PROJECT_ROOT_NAMESPACE/ ]]; then
        echo "Invalid package scope! Packages must be scoped in the root namespace of the project, e.g. \"@${CI_PROJECT_ROOT_NAMESPACE}/${CI_PROJECT_NAME}\""
        echo 'For more information, see https://docs.gitlab.com/ee/user/packages/npm_registry/#package-naming-convention'
        exit 1
      fi

    # Compare the version in package.json to all published versions.
    - |
      if [[ "$(npm view ${NPM_PACKAGE_NAME} versions)" != *"'${NPM_PACKAGE_VERSION}'"* ]]; then
        if [[ -n "${SIGSTORE_ID_TOKEN}" ]]; then
          npm publish --provenance
        else
          npm publish
        fi
        echo "Successfully published version ${NPM_PACKAGE_VERSION} of ${NPM_PACKAGE_NAME} to GitLab's NPM registry: ${CI_PROJECT_URL}/-/packages"
      else
        echo "Version ${NPM_PACKAGE_VERSION} of ${NPM_PACKAGE_NAME} has already been published, so no new version has been published."
      fi



storybook:
  stage: build
  artifacts:
    expire_in: 2 weeks
    when: always
    paths:
      - storybook/
      - public/
  script:
    - |
    - if git log -1 --pretty=%B | grep -q "chore(release):"; then
    - echo "Skipping pipeline for automated release commit."
    - exit 0  # Exit with success to skip the pipeline
    - fi

    # Ensure we have the latest package.json
    - git config --global user.email "dasdesignsystem@boeing.com"
    - git config --global user.name "dasdesignsystem"
    - git config --global --add safe.directory /builds/design/design-system/dls-global-angular
    - git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@git.web.boeing.com/design/design-system/dls-global-angular.git"
    - git pull origin ${CI_COMMIT_REF_NAME}  # Pull the latest package.json

    - echo "registry=https://${JFROG_URL}/${JFROG_REPO}/" > .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:_authToken=${JFROG_AUTHTOKEN}" >> .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:username=${JFROG_USER}" >> .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:always-auth=true" >> .npmrc
    - echo "@dasdigitalplatform:registry=https://${CI_SERVER_HOST}/api/v4/packages/npm/" >> .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - echo "Created the following .npmrc:"; cat .npmrc
    - npm cache clean --force
    - rm -rf node_modules package-lock.json  # Remove existing dependencies
    - npm install --loglevel verbose             # Install latest dependencies
    - |
      if [ "$CI_COMMIT_REF_NAME" != "develop" ]; then
        echo "Build storybook for branch."
        npm run build-storybook -- --output-dir storybook
      else
        echo "Build storybook for develop."
        npm run build-storybook -- --output-dir public
      fi

deploy-storybook:
  stage: deploy
  script:
    - echo "Let's try this"
  environment:
    name: storybook/$CI_COMMIT_REF_SLUG
    url: https://design.pages.boeing.com/design-system/dls-global-angular/$CI_COMMIT_REF_SLUG/storybook/
  #    on_stop: remove STORYBOOK
  #    on_stop: pages-clean-preview
  except:
    - develop
    - release
    - main
    - angular-19

pages:
  stage: deploy-pages
  cache:
    key: 'my-storybook'
    paths:
      - public
  script:
    - echo "mv storybook public/$CI_COMMIT_REF_SLUG"
    - echo "mv storybook $CI_COMMIT_REF_NAME"
    - |
      if [ "$CI_COMMIT_REF_NAME" != "develop" ]; then
        echo "ls public/"
        ls -la "public/" || echo "Directory does not exist yet"
        echo "Build storybook for branch."
        rm -rf "public/$CI_COMMIT_REF_SLUG"
        mkdir -p "public/$CI_COMMIT_REF_SLUG";
        mv storybook "public/$CI_COMMIT_REF_SLUG"
      fi

  artifacts:
    paths:
      - public


