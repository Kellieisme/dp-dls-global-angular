pr-develop:
  stage: test
  only:
    - merge_requests
  script:
    # Log NPM configuration
    - echo "===== NPM Configuration ====="
    - npm config list
    - echo "Registry:$(npm config get registry)"

    # Setup .npmrc for npm install
    - echo "registry=https://${JFROG_URL}/${JFROG_REPO}/" > .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:_password=${JFROG_PASSWORD}" >> .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:username=${JFROG_USER}" >> .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:always-auth=true" >> .npmrc
    - echo "@dasdigitalplatform:registry=https://${CI_SERVER_HOST}/api/v4/packages/npm/" >> .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - echo "Created the following .npmrc:"; cat .npmrc

    # Verify registry access
    - echo "===== Verifying Registry Access ====="
    - curl -I https://${JFROG_URL}/${JFROG_REPO}/ || exit 1

    # Install all dependencies
    - echo "===== Installing Dependencies ====="
    - npm install || exit 1

    # Run build and test scripts
    - echo "===== Running Scripts ====="
    - npm run lib:build || exit 1
    #    - npm run lint:lib || exit 1
    #    - npm run lint:demo || exit 1
    - npm run demo:build || exit 1
    - npm run build-storybook || exit 1

  artifacts:
    paths:
      - coverage/            # Store coverage reports as artifacts
      - lint-results/        # Store lint results as artifacts
