image: registry.web.boeing.com/container/images/stack/ubi9minimal-node20:9.4-949-1-2

stages:
  - build      # Stage for building applications
  #- release    # Stage for versioning and tagging
  - deploy     # Stage for deploying applications
  - test       # Stage for PR testing
  - deploy-pages     # Publish the pages out

# Build the Angular component library
build-package:
  stage: build
  only:
    - angular-19
    - develop

  before_script:
    # Set Git user name and email
    - git config --global user.email "dasdesignsystem@boeing.com"
    - git config --global user.name "dasdesignsystem"
    - git config --global --add safe.directory /builds/design/design-system/dls-global-angular
    - git checkout ${CI_COMMIT_REF_NAME}
    - git pull origin ${CI_COMMIT_REF_NAME}
    - echo "Current branch:"
    - git branch -a
  script:
    - |
      if git log -2 --pretty=%B | grep -q "chore(release):"; then
        echo "Skipping pipeline for automated release commit."
        exit 0  # Exit with success to skip the pipeline
      fi
    # Setup .npmrc for npm install
    - echo "registry=https://${JFROG_URL}/${JFROG_REPO}/" > .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:_authToken=${JFROG_AUTHTOKEN}" >> .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:username=${JFROG_USER}" >> .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:always-auth=true" >> .npmrc
    - echo "@dasdigitalplatform:registry=https://${CI_SERVER_HOST}/api/v4/packages/npm/" >> .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - echo "Created the following .npmrc:"; cat .npmrc
    - npm install

    # Check commit message for conventional commit triggers
    - |
      if git log -1 --pretty=%B | grep -Eiq "^(feat|fix|BREAKING CHANGE)"; then
        echo "Version bump needed. Running version-release."
        npm run version-release

        # Capture the new version from package.json
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "New version ${NEW_VERSION}"

        # Ensure subfolder package.json is updated if needed
        # Change directory to the subfolder containing the package.json
        cd projects/design/dls-global-angular/

        # Get the current version from the subfolder's package.json
        CURRENT_VERSION=$(node -p "require('./package.json').version")

        # Check if the current version is different from the new version
        if [ "$CURRENT_VERSION" != "$NEW_VERSION" ]; then
          # Update the subfolder's package.json version without creating a Git tag
          echo "Updating subfolder package.json version to ${NEW_VERSION}..."
          npm version ${NEW_VERSION} --no-git-tag-version
        else
          echo "Subfolder package.json is already up to date. No changes needed."
        fi

        # Return to the root directory
        echo "returning to the root directory"
        cd ../../..

        # Push changes only if a new version was created

        # Stage the updated subfolder's package.json for commit
        echo "staging & commiting the updated subfolder's package.json"
        git add projects/design/dls-global-angular/package.json
        # Commit the changes with a message indicating the version sync
        git commit -m "[skip ci] Sync version to ${NEW_VERSION}"


        git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@git.web.boeing.com/design/design-system/dls-global-angular.git"
        # Push the changes to the current branch, including tags
        git push --follow-tags origin HEAD:${CI_COMMIT_REF_NAME}  # Push changes to the current branch
        echo "Pushed changes and tags to the remote repository. Now build the library"

      else
        echo "No version bump needed. Keeping the same version."
      fi

    - echo "Building the library"
    - npm run release

  artifacts:
    paths:
      - dist                            # Store the 'dist' directory as an artifact

# Build the Storybook static site
build-storybook:
  stage: build
  needs:
    - build-package
  only:
    - angular-19
#    - develop
  script:
    - |
      if git log -1 --pretty=%B | grep -q "chore(release):"; then
        echo "Skipping pipeline for automated release commit."
        exit 0  # Exit with success to skip the pipeline
      fi
    # Ensure we have the latest package.json
    - git config --global user.email "dasdesignsystem@boeing.com"
    - git config --global user.name "dasdesignsystem"
    - git config --global --add safe.directory /builds/design/design-system/dls-global-angular
    - git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@git.web.boeing.com/design/design-system/dls-global-angular.git"
    - git pull origin ${CI_COMMIT_REF_NAME}  # Pull the latest package.json

    # Setup .npmrc file
    - echo "registry=https://${JFROG_URL}/${JFROG_REPO}/" > .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:_authToken=${JFROG_AUTHTOKEN}" >> .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:username=${JFROG_USER}" >> .npmrc
    - echo "//${JFROG_URL}/${JFROG_REPO}/:always-auth=true" >> .npmrc
    - echo "@dasdigitalplatform:registry=https://${CI_SERVER_HOST}/api/v4/packages/npm/" >> .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - echo "Created the following .npmrc:"; cat .npmrc

    # Clear npm cache and force install latest dependencies
    - npm cache clean --force
    - rm -rf node_modules package-lock.json  # Remove existing dependencies
    - npm install --loglevel verbose             # Install latest dependencies
    - npm run build-storybook                # Build Storybook
  artifacts:
    paths:
      - public                               # Store the 'public' directory as an artifact

